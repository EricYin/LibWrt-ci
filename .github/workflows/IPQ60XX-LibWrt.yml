name: IPQ60XX-LibWrt

on:
  workflow_dispatch:
     inputs:
      firmware_tag:
        description: "release tag"
        required: true
        type: string
        default: IPQ60XX-1.0
  workflow_call:
  # schedule:
  #   - cron: "0 18 * * *"

permissions:
  contents: read
  actions: read

jobs:
  Build:
    uses: ./.github/workflows/Build-OpenWrt.yml
    permissions:
      contents: write
      actions: write
    with:
      repo_url: https://github.com/ericyin/libwrt.git
      repo_branch: 25.12-nss
      config_file: configs/IPQ60XX.config
      firmware_tag: ${{ inputs.firmware_tag }}
      kernel_file: kernel-6.12
      artifact_prefix: IPQ60XX
      manifest_file: libwrt-qualcommax-ipq60xx.manifest
      release_summary: >-
        这是开启全功能NSS的6.12内核固件，默认主题为Argon；该固件在ImmortalWrt的基础上，添加了额外的软件包，具体详见IPQ60XX.config和General.config。
